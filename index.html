<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAU/USDT Sinyal Terminali v2.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000800; overflow-x: hidden; }
        .log-row:hover { background-color: #001f00; }
        input::placeholder { color: #555; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ============================================================================
        // TEKNİK HESAPLAMALAR & GÖSTERGE MOTORU
        // ============================================================================
        const calcEMA = (data, period) => {
            if (!data || data.length === 0) return [];
            const k = 2 / (period + 1);
            const ema = [data[0]];
            for (let i = 1; i < data.length; i++) {
                ema.push(data[i] * k + ema[i - 1] * (1 - k));
            }
            return ema;
        };

        const calcRSI = (closes, period = 14) => {
            if (closes.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                const d = closes[i] - closes[i - 1];
                if (d > 0) gains += d; else losses -= d;
            }
            let ag = gains / period, al = losses / period;
            for (let i = period + 1; i < closes.length; i++) {
                const d = closes[i] - closes[i - 1];
                ag = (ag * (period - 1) + (d > 0 ? d : 0)) / period;
                al = (al * (period - 1) + (d < 0 ? -d : 0)) / period;
            }
            if (al === 0) return 100;
            return 100 - 100 / (1 + ag / al);
        };

        const calcMACD = (closes) => {
            if (closes.length < 26) return { macd: 0, signal: 0, hist: 0 };
            const e12 = calcEMA(closes, 12), e26 = calcEMA(closes, 26);
            const ml = e12.map((v, i) => v - e26[i]);
            const sl = calcEMA(ml.slice(-9), 9);
            const last = ml[ml.length - 1], sig = sl[sl.length - 1] || 0;
            return { macd: last, signal: sig, hist: last - sig };
        };

        const calcBB = (closes, period = 20, mult = 2) => {
            if (closes.length < period) return { upper: 0, mid: 0, lower: 0 };
            const sl = closes.slice(-period);
            const mid = sl.reduce((a, b) => a + b) / period;
            const std = Math.sqrt(sl.reduce((s, v) => s + (v - mid) ** 2, 0) / period);
            return { upper: mid + mult * std, mid, lower: mid - mult * std };
        };

        const calcStoch = (highs, lows, closes, k = 14) => {
            if (closes.length < k) return { k: 50, d: 50 };
            const sh = highs.slice(-k), sl = lows.slice(-k);
            const h = Math.max(...sh), l = Math.min(...sl);
            const kv = h === l ? 50 : ((closes[closes.length - 1] - l) / (h - l)) * 100;
            return { k: kv, d: kv };
        };

        const calcATR = (highs, lows, closes, period = 14) => {
            if (closes.length < period + 1) return 1;
            const trs = [];
            for (let i = 1; i < closes.length; i++) {
                trs.push(Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i - 1]), Math.abs(lows[i] - closes[i - 1])));
            }
            return trs.slice(-period).reduce((a, b) => a + b) / period;
        };

        const calcSuperTrend = (highs, lows, closes, period = 10, mult = 3) => {
            if (closes.length < period + 1) return { trend: "NEUTRAL", val: closes[closes.length - 1] || 0 };
            const atr = calcATR(highs, lows, closes, period);
            const mid = (highs[highs.length - 1] + lows[lows.length - 1]) / 2;
            const lower = mid - mult * atr, upper = mid + mult * atr;
            const price = closes[closes.length - 1];
            if (price > lower) return { trend: "BULL", val: lower };
            if (price < upper) return { trend: "BEAR", val: upper };
            return { trend: "NEUTRAL", val: mid };
        };

        const fetchKlines = async (symbol, interval, limit = 120) => {
            const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
            const d = await r.json();
            return d.map(k => ({
                open: parseFloat(k[1]),
                high: parseFloat(k[2]),
                low: parseFloat(k[3]),
                close: parseFloat(k[4])
            }));
        };

        const analyzeTimeframe = (candles) => {
            if (!candles || candles.length < 30) return null;
            const closes = candles.map(c => c.close);
            const highs = candles.map(c => c.high);
            const lows = candles.map(c => c.low);
            const price = closes[closes.length - 1];

            const ema9 = calcEMA(closes, 9), ema21 = calcEMA(closes, 21), ema50 = calcEMA(closes, 50);
            const rsi = calcRSI(closes), macd = calcMACD(closes), bb = calcBB(closes);
            const stoch = calcStoch(highs, lows, closes), atr = calcATR(highs, lows, closes);
            const st = calcSuperTrend(highs, lows, closes);

            const e9 = ema9[ema9.length - 1], e21 = ema21[ema21.length - 1], e50 = ema50[ema50.length - 1];
            let bull = 0, bear = 0;

            if (e9 > e21 && e21 > e50) bull += 2; else if (e9 < e21 && e21 < e50) bear += 2;
            if (price > e21) bull++; else bear++;
            if (price > e50) bull++; else bear++;

            if (rsi > 55 && rsi < 75) bull += 2; else if (rsi < 45 && rsi > 25) bear += 2;
            else if (rsi >= 75) bear++; else if (rsi <= 25) bull++;

            if (macd.hist > 0 && macd.macd > macd.signal) bull += 2; else if (macd.hist < 0) bear += 2;
            if (price < bb.lower) bull += 2; else if (price > bb.upper) bear += 2;

            if (stoch.k < 25) bull += 2; else if (stoch.k > 75) bear += 2;
            if (st.trend === "BULL") bull += 3; else if (st.trend === "BEAR") bear += 3;

            const total = bull + bear;
            let bias = "NÖTR";
            if (bull > bear + 3) bias = "YUKARI"; else if (bear > bull + 3) bias = "AŞAĞI";

            return { price, rsi, macd, bb, stoch, atr, st, bullScore: bull, bearScore: bear, bias };
        };

        const generateSignal = (analyses) => {
            const tf1m = analyses["1m"], tf5m = analyses["5m"], tf1h = analyses["1h"], tf1d = analyses["1d"], tf1w = analyses["1w"];
            if (!tf1m || !tf5m || !tf1h) return null;

            const price = tf1m.price;
            const hBull = [tf1h, tf1d, tf1w].filter(Boolean).filter(t => t.bias === "YUKARI").length;
            const hBear = [tf1h, tf1d, tf1w].filter(Boolean).filter(t => t.bias === "AŞAĞI").length;
            const entryBull = tf1m.bias === "YUKARI" && tf5m.bullScore > tf5m.bearScore;
            const entryBear = tf1m.bias === "AŞAĞI" && tf5m.bearScore > tf5m.bullScore;
            const atr = tf1m.atr;

            if (hBull >= 2 && entryBull && tf1m.rsi < 70 && tf5m.macd.hist > 0) {
                return { type: "LONG", entry: price, sl: +(price - atr * 1.5).toFixed(2), tp1: +(price + atr * 2).toFixed(2), confidence: 85 };
            }
            if (hBear >= 2 && entryBear && tf1m.rsi > 30 && tf5m.macd.hist < 0) {
                return { type: "SHORT", entry: price, sl: +(price + atr * 1.5).toFixed(2), tp1: +(price - atr * 2).toFixed(2), confidence: 85 };
            }
            return null;
        };

        const playAlertSound = (type) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const freqs = type === "LONG" ? [440, 554, 659, 880] : [880, 659, 554, 440];
                freqs.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.frequency.value = freq;
                    osc.type = "square";
                    gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.12);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.25);
                    osc.start(ctx.currentTime + i * 0.12);
                    osc.stop(ctx.currentTime + i * 0.12 + 0.3);
                });
            } catch (e) { console.log("Audio error:", e); }
        };

        function MatrixRain() {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current; if (!canvas) return;
                const ctx = canvas.getContext("2d");
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                const cols = Math.floor(canvas.width / 14);
                const drops = Array(cols).fill(0);
                const iv = setInterval(() => {
                    ctx.fillStyle = "rgba(0,0,0,0.06)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#00ff41"; ctx.font = "12px monospace";
                    for (let i = 0; i < drops.length; i++) {
                        ctx.fillText("XAU"[Math.floor(Math.random()*3)], i * 14, drops[i] * 14);
                        if (drops[i] * 14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                        drops[i]++;
                    }
                }, 55);
                return () => clearInterval(iv);
            }, []);
            return <canvas ref={canvasRef} style={{ position: "fixed", top: 0, left: 0, zIndex: 0, opacity: 0.12, pointerEvents: "none" }} />;
        }

        const INTERVALS = { "1m": "1 DK", "5m": "5 DK", "1h": "1 SAAT", "1d": "1 GÜN", "1w": "1 HAFTA" };

        function App() {
            const [analyses, setAnalyses] = useState({});
            const [signal, setSignal] = useState(null);
            const [loading, setLoading] = useState(false);
            const [autoMode, setAutoMode] = useState(false);
            const [countdown, setCountdown] = useState(60);
            const [audioEnabled, setAudioEnabled] = useState(false);
            const [mircMessages, setMircMessages] = useState([
                { time: "14:02", nick: "AI-Bot", msg: "Selam şef! Yepyeni temiz kod yapısıyla terminal hazır. Sorularını bekliyorum!" }
            ]);
            const [chatInput, setChatInput] = useState("");

            const timerRef = useRef(null);
            const cdRef = useRef(null);

            const runAnalysis = useCallback(async () => {
                setLoading(true);
                try {
                    const results = {};
                    for (const tf of Object.keys(INTERVALS)) {
                        const candles = await fetchKlines("XAUUSDT", tf, 120);
                        results[tf] = analyzeTimeframe(candles);
                    }
                    setAnalyses(results);
                    const ns = generateSignal(results);
                    setSignal(ns);
                    if (ns && audioEnabled) playAlertSound(ns.type);
                    setCountdown(60);
                } catch (e) { console.log(e); }
                setLoading(false);
            }, [audioEnabled]);

            useEffect(() => {
                if (autoMode) {
                    runAnalysis();
                    timerRef.current = setInterval(runAnalysis, 60000);
                    cdRef.current = setInterval(() => setCountdown(c => c > 0 ? c - 1 : 60), 1000);
                } else {
                    clearInterval(timerRef.current);
                    clearInterval(cdRef.current);
                }
                return () => { clearInterval(timerRef.current); clearInterval(cdRef.current); };
            }, [autoMode, runAnalysis]);

            const handleChatSubmit = (e) => {
                e.preventDefault();
                if (!chatInput.trim()) return;
                const userT = chatInput.toLowerCase().trim();
                const time = new Date().toLocaleTimeString("tr-TR", { hour: '2-digit', minute: '2-digit' });
                setMircMessages(p => [...p, { time, nick: "Sen", msg: chatInput }]);
                setChatInput("");

                setTimeout(() => {
                    let res = "Anlaşılmadı şef. Trend, fiyat veya sinyal durumunu sorabilirsin.";
                    if (/selam|merhaba|slm/.test(userT)) res = "Aleykümselam kral, piyasa tarama sistemi aktif!";
                    else if (/sinyal|al sat/.test(userT)) res = signal ? `[AKTİF] Yön: ${signal.type} | Giriş: ${signal.entry}` : "Net bir kırılım sinyali yok, bekliyoruz.";
                    else if (/fiyat|kaç/.test(userT)) res = analyses["1m"] ? `Ons Altın: $${analyses["1m"].price.toFixed(2)}` : "Lütfen önce Analiz Çalıştır butonuna bas.";
                    setMircMessages(p => [...p, { time, nick: "AI-Bot", msg: res }]);
                }, 400);
            };

            return (
                <div style={{ minHeight: "100vh", padding: "12px", color: "#00ff41", fontFamily: "monospace", position: "relative" }}>
                    <MatrixRain />
                    <div style={{ maxWidth: "500px", margin: "0 auto", position: "relative", zIndex: 5 }}>
                        <div style={{ background: "#002200", border: "1px solid #00ff41", padding: "6px", textAlign: "center", fontWeight: "bold", fontSize: "12px" }}>
                            XAU/USDT ÇOKLU TF SİNYAL SİSTEMİ v2.0 (SIFIR KURULUM)
                        </div>

                        <div style={{ display: "flex", gap: "6px", margin: "10px 0" }}>
                            <button onClick={runAnalysis} disabled={loading} style={{ flex: 1, background: "#001a00", border: "1px solid #00ff41", color: "#00ff41", padding: "8px", cursor: "pointer" }}>
                                {loading ? "TARANIYOR..." : "[ANALİZ ÇALIŞTIR]"}
                            </button>
                            <button onClick={() => setAutoMode(!autoMode)} style={{ background: "#001a00", border: "1px solid #00ff41", color: "#00ff41", padding: "8px" }}>
                                {autoMode ? `AUTO [${countdown}s]` : "[AUTO]"}
                            </button>
                            <button onClick={() => setAudioEnabled(!audioEnabled)} style={{ background: "#001a00", border: "1px solid #00ff41", color: "#00ff41", padding: "8px" }}>
                                {audioEnabled ? "🔊 AÇIK" : "🔇 KAPALI"}
                            </button>
                        </div>

                        {Object.keys(analyses).length > 0 && (
                            <table style={{ width: "100%", fontSize: "12px", borderCollapse: "collapse", marginBottom: "15px" }}>
                                <thead>
                                    <tr style={{ color: "#00aa22", borderBottom: "1px solid #003300" }}>
                                        <th>TF</th><th>FİYAT</th><th>RSI</th><th>YÖN</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {Object.entries(INTERVALS).map(([tf, label]) => (
                                        <tr key={tf} style={{ textAlign: "center", borderBottom: "1px solid #001100" }}>
                                            <td style={{ fontWeight: "bold", color: "#00ff41" }}>{label}</td>
                                            <td>{analyses[tf]?.price.toFixed(2)}</td>
                                            <td>{analyses[tf]?.rsi.toFixed(1)}</td>
                                            <td style={{ color: analyses[tf]?.bias === "YUKARI" ? "#00ff41" : "#ff4444" }}>{analyses[tf]?.bias}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        )}

                        {signal && (
                            <div style={{ background: "#001a00", border: "2px solid #00ff41", padding: "8px", marginBottom: "15px" }}>
                                <b>SİNYAL: {signal.type}</b> | Giriş: {signal.entry} | Hedef: {signal.tp1}
                            </div>
                        )}

                        {/* mIRC MODULE */}
                        <div style={{ background: "#000", border: "2px solid #555" }}>
                            <div style={{ background: "#000080", color: "#fff", padding: "3px", fontSize: "11px", fontWeight: "bold" }}>#xau-ai-core : mIRC Chat Bot</div>
                            <div style={{ height: "120px", overflowY: "auto", padding: "6px", fontSize: "12px" }}>
                                {mircMessages.map((m, i) => (
                                    <div key={i}><span style={{ color: "#555" }}>[{m.time}]</span> <b>&lt;{m.nick}&gt;</b> {m.msg}</div>
                                ))}
                            </div>
                            <form onSubmit={handleChatSubmit} style={{ display: "flex", background: "#c0c0c0", padding: "2px" }}>
                                <input type="text" value={chatInput} onChange={e => setChatInput(e.target.value)} placeholder="Sorunu buraya yaz..." style={{ flex: 1, border: "1px inset #888", padding: "3px" }} />
                                <button type="submit" style={{ background: "#c0c0c0", border: "1px outset #fff" }}>Gönder</button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
